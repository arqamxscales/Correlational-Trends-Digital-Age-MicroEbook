<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Correlational Trends in the Digital Age</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121a33;
      --text: #eaf0ff;
      --muted: #b5c0de;
      --accent: #7aa2ff;
      --accent2: #68e2c2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at 10% 20%, #1f2a50 0%, var(--bg) 45%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(900px, 100%);
      background: linear-gradient(160deg, rgba(255,255,255,0.03), rgba(255,255,255,0));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: clamp(20px, 4vw, 40px);
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      line-height: 1.15;
    }
    p {
      color: var(--muted);
      line-height: 1.7;
      margin: 0 0 20px;
      font-size: 1.02rem;
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    .btn {
      text-decoration: none;
      color: #0c1530;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      font-weight: 700;
      padding: 12px 18px;
      border-radius: 12px;
      transition: transform .2s ease, opacity .2s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      opacity: .95;
    }
    .btn.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.3);
      font-weight: 600;
    }
    footer {
      margin-top: 22px;
      font-size: .9rem;
      color: #95a3cb;
    }
    code {
      color: #d7e0ff;
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Correlational Trends in the Digital Age</h1>
    <p>
      This page hosts the final research draft and source file for the project.
      You can read the publication-ready PDF or access the editable Apple Pages version.
    </p>

    <div class="links">
      <a class="btn" href="Correlational%20Trends%20in%20the%20Digital%20Age%20F%C4%B1nal%20Draft.pdf" target="_blank" rel="noopener">Open Final PDF</a>
      <a class="btn secondary" href="Copy/Correlational%20Trends%20in%20the%20Digital%20Age.pages" target="_blank" rel="noopener">Open Pages Source</a>
    </div>

    <footer>
      Deployed with GitHub Pages · Repository root contains <code>index.html</code>
    </footer>
  </main>
</body>
</html>
